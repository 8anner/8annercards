<!DOCTYPE html>
<html>
<head>
<style>
  /* 卡牌链接容器 */
  .card-link {
    position: relative;
    display: inline-block;
    color: #0066cc;
    text-decoration: underline;
    cursor: help;
  }

  /* 悬浮时显示的图片 */
  .card-link:hover::after {
    content: "";
    position: absolute;
    left: 0;
    top: 1.8em;
    width: 180px;
    height: 250px;
    background-image: var(--card-img);
    background-size: contain;
    background-repeat: no-repeat;
    background-color: white;
    border: 2px solid #333;
    border-radius: 10px;
    box-shadow: 4px 4px 10px rgba(0,0,0,0.3);
    z-index: 1000;
    pointer-events: none;  /* 让鼠标可以穿透，不干扰点击 */
  }

  /* 为每个卡牌单独指定图片 */
  .card-EQ-001 { --card-img: url('./EQ-001.png'); }
  .card-EQ-002 { --card-img: url('./EQ-002.png'); }
  .card-EQ-003 { --card-img: url('./EQ-003.png'); }
  .card-EQ-004 { --card-img: url('./EQ-004.png'); }
  .card-EQ-005 { --card-img: url('./EQ-005.png'); }
  .card-EQ-006 { --card-img: url('./EQ-006.png'); }
  
  /* ... 继续添加其他卡牌 */
</style>
</head>
<body>

<h1>卡牌总览喵喵喵...都怪我，这个页面是用AI写的...</h1>
  
<p><span class="card-link card-EQ-001">EQ-001</span>&nbsp;&nbsp;&nbsp;磨刀石</p>
<p><span class="card-link card-EQ-002">EQ-002</span>&nbsp;&nbsp;&nbsp;水晶球</p>
<p><span class="card-link card-EQ-003">EQ-003</span>&nbsp;&nbsp;&nbsp;轻盈之刃</p>
<p><span class="card-link card-EQ-004">EQ-004</span>&nbsp;&nbsp;&nbsp;火焰屏障</p>
<p><span class="card-link card-EQ-005">EQ-005</span>&nbsp;&nbsp;&nbsp;神圣之剑</p>
<p><span class="card-link card-EQ-006">EQ-006</span>&nbsp;&nbsp;&nbsp;过载</p>


<p><a href="/8annercards/cards">返回上一级</a></p>

</body>
</html>
